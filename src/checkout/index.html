<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header id="header" class="divider"></header>

    <main class="divider">
      <section class="checkout">
        <h2>Review & Place Your Order</h2>
        <form name="checkout" id="checkoutForm" class="checkout-form">
          <fieldset>
            <legend>Shipping</legend>
            <label for="fname">First Name</label>
            <input id="fname" name="fname" type="text" autocomplete="given-name" required />

            <label for="lname">Last Name</label>
            <input id="lname" name="lname" type="text" autocomplete="family-name" required />

            <label for="street">Street Address</label>
            <input id="street" name="street" type="text" autocomplete="street-address" required />

            <label for="city">City</label>
            <input id="city" name="city" type="text" autocomplete="address-level2" required />

            <label for="state">State</label>
            <input
              id="state"
              name="state"
              type="text"
              autocomplete="address-level1"
              pattern="[A-Za-z]{2}"
              maxlength="2"
              title="Use a two-letter state abbreviation."
              required
            />

            <label for="zip">Zip</label>
            <input
              id="zip"
              name="zip"
              type="text"
              inputmode="numeric"
              autocomplete="postal-code"
              pattern="[0-9]{5}"
              title="Use a five-digit ZIP code."
              required
            />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number</label>
            <input
              id="cardNumber"
              name="cardNumber"
              type="text"
              inputmode="numeric"
              autocomplete="cc-number"
              pattern="[0-9 ]{13,19}"
              title="Use 13 to 19 digits."
              required
            />

            <label for="expiration">Expiration</label>
            <input
              id="expiration"
              name="expiration"
              type="text"
              autocomplete="cc-exp"
              placeholder="MM/YY"
              pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
              title="Use MM/YY format."
              required
            />

            <label for="code">Security Code</label>
            <input
              id="code"
              name="code"
              type="text"
              inputmode="numeric"
              autocomplete="cc-csc"
              pattern="[0-9]{3,4}"
              title="Use a three or four digit security code."
              required
            />
          </fieldset>

          <section class="order-summary" aria-live="polite">
            <h3>Order Summary</h3>
            <p>Subtotal: $<span id="subtotal">0.00</span></p>
            <p>Shipping: $<span id="shipping">0.00</span></p>
            <p>Tax: $<span id="tax">0.00</span></p>
            <p class="order-total">Order Total: $<span id="orderTotal">0.00</span></p>
          </section>

          <p id="checkoutMessage" class="checkout-message" role="status"></p>
          <button type="submit">Place Order</button>
        </form>
      </section>
    </main>

    <footer id="footer"></footer>
  </body>
</html>
